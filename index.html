<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Viagens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #37352f; }
        .notion-input { border: 1px solid #e1dfdd; border-radius: 4px; padding: 8px 12px; outline: none; transition: border 0.2s; font-size: 14px; width: 100%; }
        .notion-input:focus { border-color: #2eaadc; }
        .notion-btn { background-color: #2eaadc; color: white; padding: 8px 16px; border-radius: 4px; font-weight: 500; font-size: 14px; cursor: pointer; transition: background 0.2s; border: none;}
        .notion-btn:hover { background-color: #1a8fbc; }
        .notion-card { border: 1px solid #e1dfdd; border-radius: 6px; padding: 16px; box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 2px 4px; }
        .tab { cursor: pointer; padding-bottom: 4px; color: #787774; }
        .tab.active { border-bottom: 2px solid #37352f; color: #37352f; font-weight: 600; }
        .tag { background-color: #f1f1ef; padding: 2px 6px; border-radius: 3px; font-size: 12px; color: #505050; margin-right: 4px; }
        #map { height: 500px; width: 100%; border-radius: 6px; z-index: 1; }
    </style>
</head>
<body class="max-w-5xl mx-auto p-6">

    <header class="mb-8">
        <h1 class="text-3xl font-bold mb-4 flex items-center gap-2">✈️ Tracker de Viagens</h1>
        <div class="flex gap-6 border-b border-gray-200">
            <div class="tab active" onclick="switchTab('dashboard')">📋 Dashboard</div>
            <div class="tab" onclick="switchTab('mapa')">🗺️ Mapa de Frequência</div>
        </div>
    </header>

    <div id="tab-dashboard">
        <section class="mb-10 bg-[#fbfbfa] p-6 rounded-lg border border-gray-200">
            <h2 class="text-lg font-semibold mb-4">Adicionar Nova Viagem</h2>
            <form id="tripForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Nome da Viagem</label>
                    <input type="text" id="viagem" class="notion-input" required placeholder="Ex: Férias de Verão">
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Cidade</label>
                    <input type="text" id="cidade" class="notion-input" required placeholder="Ex: Recife">
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">UF</label>
                    <select id="uf" class="notion-input" required>
                        <option value="">Selecione...</option>
                        <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                        <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                        <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                        <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                        <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                        <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                        <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                        <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                        <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Data de Início</label>
                    <input type="date" id="dataInicio" class="notion-input" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Data de Fim</label>
                    <input type="date" id="dataFim" class="notion-input" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Tags / Motivo (separado por vírgula)</label>
                    <input type="text" id="tags" class="notion-input" placeholder="Ex: Praia, Descanso">
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Artistas / Evento</label>
                    <input type="text" id="artistas" class="notion-input" placeholder="Opcional">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm text-gray-500 mb-1">Viajantes</label>
                    <input type="text" id="viajantes" class="notion-input" placeholder="Ex: Eu, Fulano">
                </div>
                <div class="md:col-span-3 flex justify-end mt-2">
                    <button type="submit" class="notion-btn">Salvar Viagem</button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Histórico de Viagens</h2>
                <input type="text" id="search" class="notion-input w-64" placeholder="Filtrar por cidade, tag..." onkeyup="renderTrips()">
            </div>
            <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>
    </div>

    <div id="tab-mapa" class="hidden">
        <div class="mb-4 text-sm text-gray-500">
            * O tamanho da bolha representa a frequência de visitas e duração aproximada.
        </div>
        <div id="map"></div>
    </div>

    <script>
        // Dados Iniciais Simulados
        const mockData = [
            { id: 1, viagem: "Tour Nordeste", cidade: "Recife", uf: "PE", dataInicio: "2026-03-02", dataFim: "2026-03-06", tags: "Praia, Lazer, Grupo", artistas: "", viajantes: "Paulo, Dany, Fer +3", lat: -8.0476, lng: -34.8770 },
            { id: 2, viagem: "Show no Engenhão", cidade: "Rio de Janeiro", uf: "RJ", dataInicio: "2026-04-26", dataFim: "2026-04-27", tags: "Show, Fim de semana", artistas: "The Weeknd", viajantes: "Paulo, Namorada", lat: -22.9068, lng: -43.1729 },
            { id: 3, viagem: "Festival", cidade: "São Paulo", uf: "SP", dataInicio: "2026-03-27", dataFim: "2026-03-29", tags: "Música, Festival", artistas: "Vários", viajantes: "Paulo, Namorada", lat: -23.5505, lng: -46.6333 }
        ];

        let trips = JSON.parse(localStorage.getItem('viagens')) || mockData;
        let map;
        let markersGroup;

        // Gerenciamento de Abas
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-dashboard').classList.add('hidden');
            document.getElementById('tab-mapa').classList.add('hidden');

            if (tabName === 'dashboard') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tab-dashboard').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-mapa').classList.remove('hidden');
                if (!map) initMap();
                setTimeout(() => map.invalidateSize(), 100); 
            }
        }

        // Renderizar Galeria (Notion-style)
        function renderTrips() {
            const gallery = document.getElementById('gallery');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            gallery.innerHTML = '';

            const filteredTrips = trips.filter(t => 
                t.cidade.toLowerCase().includes(searchTerm) || 
                t.viagem.toLowerCase().includes(searchTerm) ||
                t.tags.toLowerCase().includes(searchTerm)
            );

            filteredTrips.reverse().forEach(trip => {
                const tagsHtml = trip.tags.split(',').map(tag => `<span class="tag">${tag.trim()}</span>`).join('');
                gallery.innerHTML += `
                    <div class="notion-card flex flex-col justify-between">
                        <div>
                            <h3 class="font-semibold text-lg">${trip.viagem}</h3>
                            <p class="text-sm text-gray-500 mb-2">📍 ${trip.cidade}, ${trip.uf}</p>
                            <p class="text-xs mb-3 text-gray-400">📅 ${formatDate(trip.dataInicio)} - ${formatDate(trip.dataFim)}</p>
                            <div class="mb-3">${tagsHtml}</div>
                            ${trip.artistas ? `<p class="text-sm">🎵 <b>Artistas:</b> ${trip.artistas}</p>` : ''}
                            <p class="text-sm">👥 <b>Com:</b> ${trip.viajantes}</p>
                        </div>
                        <button onclick="deleteTrip(${trip.id})" class="text-red-400 text-xs text-right mt-4 hover:underline">Remover</button>
                    </div>
                `;
            });
        }

        function formatDate(dateStr) {
            if(!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        // Formulário e Automação de Coordenadas (Geocoding API Nominatim)
        document.getElementById('tripForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Buscando Coordenadas...';
            btn.disabled = true;

            const cidade = document.getElementById('cidade').value;
            const uf = document.getElementById('uf').value;

            // Busca automática na base pública de coordenadas
            let lat = 0, lng = 0;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cidade},+${uf},+Brazil`);
                const data = await res.json();
                if(data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lng = parseFloat(data[0].lon);
                }
            } catch (err) {
                console.error("Erro ao buscar coordenadas", err);
            }

            const newTrip = {
                id: Date.now(),
                viagem: document.getElementById('viagem').value,
                cidade, uf,
                dataInicio: document.getElementById('dataInicio').value,
                dataFim: document.getElementById('dataFim').value,
                tags: document.getElementById('tags').value,
                artistas: document.getElementById('artistas').value,
                viajantes: document.getElementById('viajantes').value,
                lat, lng
            };

            trips.push(newTrip);
            localStorage.setItem('viagens', JSON.stringify(trips));
            
            e.target.reset();
            btn.innerText = 'Salvar Viagem';
            btn.disabled = false;
            
            renderTrips();
            if(map) updateMap();
        });

        function deleteTrip(id) {
            trips = trips.filter(t => t.id !== id);
            localStorage.setItem('viagens', JSON.stringify(trips));
            renderTrips();
            if(map) updateMap();
        }

        // Inicializar Mapa de Bolhas (Leaflet)
        function initMap() {
            map = L.map('map').setView([-14.235, -51.925], 4); // Centro do Brasil
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
            updateMap();
        }

        function updateMap() {
            markersGroup.clearLayers();
            
            // Agrupar visitas por cidade para o Mapa de Bolhas (Centroides)
            const freq = {};
            trips.forEach(t => {
                if(t.lat && t.lng) {
                    const key = `${t.cidade}-${t.uf}`;
                    if(!freq[key]) freq[key] = { count: 0, lat: t.lat, lng: t.lng, trips: [] };
                    freq[key].count += 1;
                    freq[key].trips.push(t.viagem);
                }
            });

            for(const key in freq) {
                const loc = freq[key];
                // O raio cresce com base na frequência
                const radius = 10 + (loc.count * 5); 
                
                L.circleMarker([loc.lat, loc.lng], {
                    radius: radius,
                    fillColor: "#2eaadc",
                    color: "#1a8fbc",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.6
                })
                .bindPopup(`<b>${key.replace('-', ', ')}</b><br>Visitas: ${loc.count}<br><span class="text-xs text-gray-500">${loc.trips.join(', ')}</span>`)
                .addTo(markersGroup);
            }
        }

        // Init
        renderTrips();
    </script>
</body>
</html>
